name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  package_and_release:
    runs-on: ${{ matrix.os }}
    env:
      npm_config_registry: https://registry.npmjs.org
      ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
      NPM_CONFIG_ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
      NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
      NPM_CONFIG_ELECTRON_BUILDER_BINARIES_CUSTOM_DIR: ""
      ELECTRON_BUILDER_BINARIES_CUSTOM_DIR: ""
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            build_command: npm run build && npx electron-builder --linux AppImage deb --x64
          - os: windows-latest
            artifact_name: windows
            build_command: npm run build:win
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Print download config
        run: |
          echo "npm registry: $(npm config get registry)"
          echo "npm electron builder binaries mirror: $(npm config get electron_builder_binaries_mirror)"
          echo "npm electron builder binaries custom dir: $(npm config get electron_builder_binaries_custom_dir)"
          echo "ELECTRON_MIRROR=$ELECTRON_MIRROR"
          echo "ELECTRON_BUILDER_BINARIES_MIRROR=$ELECTRON_BUILDER_BINARIES_MIRROR"
          echo "NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR=$NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: ${{ matrix.build_command }}
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.run_number }}-${{ matrix.artifact_name }}
          path: dist/**

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: false
          prerelease: false
          files: |
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
